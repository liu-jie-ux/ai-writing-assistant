<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Writing Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#FAFAF8;min-height:100vh;
  display:flex;justify-content:center;
  padding:3rem 1.5rem 5rem;
}
.app{width:100%;max-width:720px;}
.header{text-align:center;margin-bottom:2.5rem;}
.header h1{font-size:24px;font-weight:500;color:#1C1C1E;letter-spacing:-0.5px;}
.header p{font-size:13px;color:#8E8E93;margin-top:5px;}

.input-wrap{background:#fff;border:0.5px solid #E5E5EA;border-radius:16px;padding:16px 18px 12px;margin-bottom:1.75rem;}
.input-wrap textarea{width:100%;min-height:96px;resize:none;font-size:15px;font-family:inherit;color:#1C1C1E;background:transparent;border:none;outline:none;line-height:1.65;}
.input-wrap textarea::placeholder{color:#C7C7CC;}
.input-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:0.5px solid #F2F2F7;}
.char-count{font-size:12px;color:#C7C7CC;font-variant-numeric:tabular-nums;}
.send-btn{padding:8px 22px;font-size:14px;font-weight:500;cursor:pointer;border-radius:20px;border:none;background:#1C1C1E;color:#fff;letter-spacing:0.1px;transition:opacity 0.15s,transform 0.1s;}
.send-btn:hover{opacity:0.85;}
.send-btn:active{transform:scale(0.97);}
.send-btn:disabled{opacity:0.3;cursor:not-allowed;}

.robots{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-bottom:2.5rem;}
.robot-card{background:#fff;border:0.5px solid #E5E5EA;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;}
.card-accent{height:3px;}
.card-accent.formal{background:#378ADD;}
.card-accent.natural{background:#BA7517;}
.card-accent.business{background:#3B6D11;}
.card-body{padding:1.1rem 1rem 1.1rem;display:flex;flex-direction:column;gap:10px;flex:1;}
.robot-head{display:flex;flex-direction:column;align-items:center;gap:7px;}
.avatar-wrap{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;}
.avatar-wrap.formal{background:#EEF5FD;}
.avatar-wrap.natural{background:#FDF6E8;}
.avatar-wrap.business{background:#EEF5EE;}
.robot-name{font-size:11px;font-weight:500;color:#8E8E93;text-transform:uppercase;letter-spacing:1px;}
.robot-badge{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;}
.robot-badge.formal{background:#EEF5FD;color:#185FA5;}
.robot-badge.natural{background:#FDF6E8;color:#854F0B;}
.robot-badge.business{background:#EEF5EE;color:#3B6D11;}
.divider{height:0.5px;background:#F2F2F7;}
.output-wrap{display:flex;flex-direction:column;gap:8px;flex:1;}
.robot-output{font-size:13.5px;line-height:1.7;color:#3A3A3C;min-height:60px;}
.placeholder{color:#C7C7CC;font-style:italic;font-size:13px;}

.copy-btn{
  align-self:flex-end;
  display:flex;align-items:center;gap:4px;
  font-size:11px;color:#8E8E93;
  background:none;border:0.5px solid #E5E5EA;
  border-radius:6px;padding:4px 9px;cursor:pointer;
  transition:background 0.12s,color 0.12s,border-color 0.12s;
}
.copy-btn:hover{background:#F5F5F5;color:#3A3A3C;}
.copy-btn.copied{color:#3B6D11;border-color:#C0DD97;background:#EEF5EE;}

.thinking{display:flex;gap:5px;align-items:center;padding:6px 0;}
.dot{width:6px;height:6px;border-radius:50%;animation:bounce 1.2s infinite;}
.dot.formal{background:#378ADD;}
.dot.natural{background:#BA7517;}
.dot.business{background:#3B6D11;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
.cursor{display:inline-block;width:1.5px;height:13px;background:#8E8E93;vertical-align:middle;margin-left:1px;animation:blink .75s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.history-section{margin-top:0.5rem;}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.history-title{font-size:14px;font-weight:500;color:#1C1C1E;}
.history-count{font-size:12px;color:#8E8E93;}
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap input{
  width:100%;padding:9px 14px 9px 36px;
  font-size:13px;font-family:inherit;
  background:#fff;color:#1C1C1E;
  border:0.5px solid #E5E5EA;border-radius:10px;outline:none;
  transition:border-color 0.15s;
}
.search-wrap input:focus{border-color:#C7C7CC;}
.search-wrap input::placeholder{color:#C7C7CC;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#C7C7CC;font-size:16px;pointer-events:none;}
.history-list{display:flex;flex-direction:column;gap:8px;}
.history-item{background:#fff;border:0.5px solid #E5E5EA;border-radius:12px;padding:12px 14px;}
.history-original{font-size:13px;color:#3A3A3C;margin-bottom:6px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-previews{display:flex;gap:6px;flex-wrap:wrap;}
.history-tag{font-size:11px;padding:2px 7px;border-radius:5px;}
.history-tag.formal{background:#EEF5FD;color:#185FA5;}
.history-tag.natural{background:#FDF6E8;color:#854F0B;}
.history-tag.business{background:#EEF5EE;color:#3B6D11;}
.history-time{font-size:11px;color:#C7C7CC;margin-top:6px;}
.history-empty{font-size:13px;color:#C7C7CC;text-align:center;padding:2rem 0;font-style:italic;}
.error-msg{font-size:13px;color:#FF3B30;text-align:center;margin-top:1rem;}
mark{background:#FFF3B0;border-radius:2px;padding:0 1px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Writing Assistant</h1>
    <p>Enter your text. Three voices, one click.</p>
  </div>

  <div class="input-wrap">
    <textarea id="inputText" placeholder="Type something you'd like to rewrite..." oninput="updateCount()"></textarea>
    <div class="input-footer">
      <span class="char-count" id="charCount">0 characters</span>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">Rewrite</button>
    </div>
  </div>

  <div class="robots">
    <div class="robot-card">
      <div class="card-accent formal"></div>
      <div class="card-body">
        <div class="robot-head">
          <div class="avatar-wrap formal">🎩</div>
          <span class="robot-name">Formal</span>
          <span class="robot-badge formal">Polished</span>
        </div>
        <div class="divider"></div>
        <div class="output-wrap">
          <div class="robot-output" id="out-formal"><span class="placeholder">Awaiting input...</span></div>
          <button class="copy-btn" id="copy-formal" onclick="copyText('formal')" style="display:none">⎘ Copy</button>
        </div>
      </div>
    </div>

    <div class="robot-card">
      <div class="card-accent natural"></div>
      <div class="card-body">
        <div class="robot-head">
          <div class="avatar-wrap natural">
            <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="17" cy="12" r="7" fill="#F5C842"/>
              <ellipse cx="12" cy="10" rx="2.5" ry="3.5" fill="#E8B020" opacity=".5"/>
              <circle cx="14.5" cy="12.5" r="1.8" fill="#fff"/>
              <circle cx="19.5" cy="12.5" r="1.8" fill="#fff"/>
              <circle cx="15" cy="12.5" r="0.9" fill="#3A3A3C"/>
              <circle cx="20" cy="12.5" r="0.9" fill="#3A3A3C"/>
              <path d="M14.5 16 Q17 18 19.5 16" stroke="#3A3A3C" stroke-width="1" stroke-linecap="round" fill="none"/>
              <path d="M8 30 Q8 22 17 22 Q26 22 26 30" fill="#A0C4FF"/>
            </svg>
          </div>
          <span class="robot-name">Natural</span>
          <span class="robot-badge natural">Conversational</span>
        </div>
        <div class="divider"></div>
        <div class="output-wrap">
          <div class="robot-output" id="out-natural"><span class="placeholder">Awaiting input...</span></div>
          <button class="copy-btn" id="copy-natural" onclick="copyText('natural')" style="display:none">⎘ Copy</button>
        </div>
      </div>
    </div>

    <div class="robot-card">
      <div class="card-accent business"></div>
      <div class="card-body">
        <div class="robot-head">
          <div class="avatar-wrap business">💼</div>
          <span class="robot-name">Business</span>
          <span class="robot-badge business">Corporate</span>
        </div>
        <div class="divider"></div>
        <div class="output-wrap">
          <div class="robot-output" id="out-business"><span class="placeholder">Awaiting input...</span></div>
          <button class="copy-btn" id="copy-business" onclick="copyText('business')" style="display:none">⎘ Copy</button>
        </div>
      </div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <span class="history-title">History</span>
      <span class="history-count" id="historyCount"></span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#9906;</span>
      <input type="text" id="searchInput" placeholder="Search history..." oninput="filterHistory()">
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No history yet</div>
    </div>
  </div>

  <div id="errorMsg" class="error-msg" style="display:none;"></div>
</div>

<script>
const STYLES=['formal','natural','business'];
let currentData={};
let allHistory=[];

function updateCount(){
  const n=document.getElementById('inputText').value.length;
  document.getElementById('charCount').textContent=n+' character'+(n===1?'':'s');
}

function hideCopyBtns(){
  STYLES.forEach(s=>{
    const b=document.getElementById('copy-'+s);
    b.style.display='none';
    b.classList.remove('copied');
    b.textContent='⎘ Copy';
  });
}

function setThinking(){
  hideCopyBtns();
  STYLES.forEach(s=>{
    document.getElementById('out-'+s).innerHTML=
      '<div class="thinking">'+
      '<div class="dot '+s+'"></div>'+
      '<div class="dot '+s+'"></div>'+
      '<div class="dot '+s+'"></div>'+
      '</div>';
  });
}

function typeText(elId,text){
  return new Promise(resolve=>{
    const el=document.getElementById(elId);
    el.innerHTML='<span class="cursor"></span>';
    let i=0;
    const cur=el.querySelector('.cursor');
    const iv=setInterval(()=>{
      if(i>=text.length){clearInterval(iv);cur.remove();resolve();return;}
      cur.insertAdjacentText('beforebegin',text[i++]);
    },16);
  });
}

function copyText(style){
  const text=currentData[style];
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copy-'+style);
    btn.classList.add('copied');
    btn.textContent='✓ Copied!';
    setTimeout(()=>{
      btn.classList.remove('copied');
      btn.textContent='⎘ Copy';
    },2000);
  });
}

function formatTime(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+
    ' · '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text,query){
  const safe=escapeHtml(text);
  if(!query)return safe;
  const re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return safe.replace(re,'<mark>$1</mark>');
}

function renderHistory(items,query){
  const list=document.getElementById('historyList');
  const count=document.getElementById('historyCount');
  count.textContent=items.length+' record'+(items.length===1?'':'s');
  if(!items.length){
    list.innerHTML='<div class="history-empty">'+(query?'No results for "'+escapeHtml(query)+'"':'No history yet')+'</div>';
    return;
  }
  list.innerHTML=items.map(r=>`
    <div class="history-item">
      <div class="history-original">${highlight(r.original,query)}</div>
      <div class="history-previews">
        <span class="history-tag formal">F: ${highlight(r.formal.slice(0,30),query)}…</span>
        <span class="history-tag natural">N: ${highlight(r.natural.slice(0,30),query)}…</span>
        <span class="history-tag business">B: ${highlight(r.business.slice(0,30),query)}…</span>
      </div>
      <div class="history-time">${formatTime(r.createdAt)}</div>
    </div>
  `).join('');
}

function filterHistory(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered=q?allHistory.filter(r=>
    r.original.toLowerCase().includes(q)||
    r.formal.toLowerCase().includes(q)||
    r.natural.toLowerCase().includes(q)||
    r.business.toLowerCase().includes(q)
  ):allHistory;
  renderHistory(filtered,q);
}

async function loadHistory(){
  try{
    const res=await fetch('/api/history');
    if(res.ok){allHistory=await res.json();filterHistory();}
  }catch(e){}
}

async function handleSend(){
  const text=document.getElementById('inputText').value.trim();
  if(!text)return;
  const btn=document.getElementById('sendBtn');
  const err=document.getElementById('errorMsg');
  err.style.display='none';
  btn.disabled=true;btn.textContent='Thinking...';
  setThinking();
  try{
    const res=await fetch('/api/improve',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });
    if(!res.ok){
      const data=await res.json().catch(()=>({}));
      throw new Error(data.error||'Server error '+res.status);
    }
    const data=await res.json();
    currentData={formal:data.formal,natural:data.natural,business:data.business};
    await Promise.all(STYLES.map(s=>typeText('out-'+s,currentData[s])));
    STYLES.forEach(s=>{document.getElementById('copy-'+s).style.display='flex';});
    allHistory=[data,...allHistory];
    filterHistory();
  }catch(e){
    STYLES.forEach(s=>{
      document.getElementById('out-'+s).innerHTML='<span class="placeholder">–</span>';
    });
    err.textContent=e.message||'Could not connect. Is the server running?';
    err.style.display='block';
  }finally{
    btn.disabled=false;btn.textContent='Rewrite';
  }
}

document.getElementById('inputText').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))handleSend();
});

loadHistory();
</script>
</body>
</html>
